---
# hello-world — tiny HTTP echo server
# Responds with a custom message on every GET request
#
# Access:
#   NodePort  →  curl http://192.168.56.10:30100
#   Ingress   →  curl -H "Host: hello.local" http://192.168.56.10:30080
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-world
  namespace: default
  labels:
    app: hello-world
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-world
  template:
    metadata:
      labels:
        app: hello-world
    spec:
      containers:
        - name: hello-world
          image: hashicorp/http-echo:latest
          args:
            - "-text=Hello World from MicroK8s! (spoke node)"
            - "-listen=:5678"
          ports:
            - name: http
              containerPort: 5678
          resources:
            requests:
              memory: "16Mi"
              cpu: "25m"
            limits:
              memory: "32Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: hello-world
  namespace: default
spec:
  selector:
    app: hello-world
  type: NodePort
  ports:
    - name: http
      port: 80
      targetPort: 5678
      nodePort: 30100
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hello-world
  namespace: default
  annotations:
    # This tells Argo CD to consider the resource healthy 
    # even if the status.loadBalancer is empty
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  ingressClassName: traefik
  rules:
    - host: hello.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hello-world
                port:
                  number: 80
