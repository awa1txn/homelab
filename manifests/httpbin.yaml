---
# go-httpbin — full-featured HTTP testing service
# Mirrors headers, query params, request body, supports /get /post /put /delete etc.
#
# Access:
#   NodePort  →  curl http://192.168.56.10:30200/get
#                curl -X POST http://192.168.56.10:30200/post -d '{"key":"value"}'
#                curl http://192.168.56.10:30200/headers
#                curl http://192.168.56.10:30200/uuid
#   Ingress   →  curl -H "Host: api.local" http://192.168.56.10:30080/get
apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpbin
  namespace: default
  labels:
    app: httpbin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: httpbin
  template:
    metadata:
      labels:
        app: httpbin
    spec:
      nodeSelector:
        kubernetes.io/hostname: spoke
      containers:
        - name: httpbin
          image: mccutchen/go-httpbin:latest
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: httpbin
  namespace: default
spec:
  selector:
    app: httpbin
  type: NodePort
  ports:
    - name: http
      port: 80
      targetPort: 8080
      nodePort: 30200
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: httpbin
  namespace: default
spec:
  ingressClassName: traefik
  rules:
    - host: api.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: httpbin
                port:
                  number: 80
